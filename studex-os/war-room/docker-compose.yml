version: "3.8"

networks:
  studex-net:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  uploads:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

services:
  mongo:
    image: mongo:6.0
    container_name: rocketchat_mongo
    restart: unless-stopped
    networks:
      - studex-net
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: rocketchat
    mem_limit: 1g
    cpus: 0.5
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  rocketchat:
    image: rocketchat/rocket.chat:7
    container_name: rocketchat_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - studex-net
    volumes:
      - uploads:/app/uploads
      - ./assets:/app/assets:ro
    environment:
      MONGO_URL: mongodb://mongo:27017/rocketchat
      ROOT_URL: http://67.213.119.157:3000
      PORT: 3000
      BIND_IP: 0.0.0.0
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@studexmeat.com
      ADMIN_PASS: StudexMeat2026
      UPLOAD_STORAGE_TYPE: GridFS
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=2048
    mem_limit: 2g
    cpus: 1.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/info"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    ports:
      - "0.0.0.0:3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: rocketchat_caddy
    restart: unless-stopped
    networks:
      - studex-net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    environment:
      DOMAIN: warroom.studexmeat.com
      ADMIN_EMAIL: ceo@studexmeat.com
    mem_limit: 256m
    cpus: 0.25
